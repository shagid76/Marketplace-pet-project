version: '3.9'

services:

  backend:
    build: .
    container_name: marketplace-backend
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - DB_HOST=mongodb
      - DB_PORT=27017
      - URIS=http://elasticsearch:9200
      - S3_ENDPOINT=http://minio:9000
      - FRONTEND_ORIGIN=http://localhost:3000
    depends_on:
      mongodb:
        condition: service_healthy
      mongo-init:
        condition: service_completed_successfully
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped

  mongodb:
    image: mongo:7
    container_name: mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${DB_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${DB_PASSWORD}
    command: ["--replSet", "rs0", "--bind_ip_all"]
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  mongo-init:
    image: mongo:7
    depends_on:
      mongodb:
        condition: service_healthy
    command: >
      mongosh --host mongodb
        -u ${DB_USERNAME} -p ${DB_PASSWORD}
        --authenticationDatabase admin
        --eval "try { rs.status() } catch(e) { rs.initiate({_id:'rs0',members:[{_id:0,host:'mongodb:27017'}]}) }"
    restart: "no"

  minio:
    image: minio/minio
    container_name: minio
    ports:
      - "9090:9090"
      - "9000:9000"
    volumes:
      - minio_data:/data
    environment:
      MINIO_ROOT_USER: ${ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${SECRET_KEY}
    command: server /data --console-address ":9090"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/ready"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  minio-init:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    environment:
      - ACCESS_KEY=${ACCESS_KEY}
      - SECRET_KEY=${SECRET_KEY}
      - BUCKET_NAME=${BUCKET_NAME}
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 $$ACCESS_KEY $$SECRET_KEY &&
        mc mb --ignore-existing local/$$BUCKET_NAME &&
        mc anonymous set download local/$$BUCKET_NAME
      "
    restart: "no"

  elasticsearch:
    image: elasticsearch:8.11.0
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=5s || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 60s
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    restart: unless-stopped

  stripe:
    image: stripe/stripe-cli
    environment:
      - STRIPE_API_KEY=${STRIPE_API_KEY}
    command: listen --api-key=${STRIPE_API_KEY} --events=checkout.session.completed --forward-to=http://backend:8080/api/payments/webhook
    depends_on:
      - backend
    restart: on-failure

volumes:
  mongodb_data: {}
  minio_data: {}
  es_data: {}
